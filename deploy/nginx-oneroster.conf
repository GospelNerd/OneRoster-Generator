# Optional nginx reverse proxy: TLS + HTTP basic auth in front of the app.
#   sudo apt-get install -y apache2-utils nginx
#   sudo htpasswd -c /etc/nginx/.htpasswd qa
#   sudo cp deploy/nginx-oneroster.conf /etc/nginx/sites-available/oneroster
#   sudo ln -s /etc/nginx/sites-available/oneroster /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot for a cert, or terminate TLS at a DO load balancer.
server {
    listen 80;
    server_name oneroster.devspace.example;  # replace with your host

    auth_basic "OneRoster QA";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:4400;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
